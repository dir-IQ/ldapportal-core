# Pilot: classes-parallel JUnit Jupiter execution for the addons/isva module.
#
# Pattern (per CI parallelism rollout plan):
#   - classes run concurrently — one class per worker thread
#   - methods inside a class stay serial (same_thread) — conservative
#     starting point, since most flake comes from intra-class shared state
#   - dynamic worker pool sized to available cores (factor 1.0)
#
# Forks stay at default forkCount=1, reuseForks=true (set in root
# pluginManagement) so the Spring context cache is preserved — these
# threads run inside the single per-module JVM.
#
# This file is per-module so the rollout can be staged: core and ee
# adopt the same config independently once each module's shared-state
# audit (H2 DB, @MockBean, embedded LDAP) is clean.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
junit.jupiter.execution.parallel.config.dynamic.factor=1.0
